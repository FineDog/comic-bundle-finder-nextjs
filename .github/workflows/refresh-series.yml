# Fetches fresh eBay data for all series and commits the results as static
# JSON files (data/cache/{slug}.json). The commit triggers a Vercel redeploy
# so the app always serves up-to-date cached data with zero Blob API calls.
#
# Required GitHub secrets:
#   EBAY_APP_ID   — eBay OAuth client ID
#   EBAY_SECRET   — eBay OAuth client secret
# Optional:
#   EBAY_CAMPAIGN_ID — eBay Partner Network campaign ID (affiliate links)

name: Refresh Series Cache

on:
  schedule:
    - cron: "0 6 * * *"   # 6:00 AM UTC daily (2 AM Eastern)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Fetch eBay data and write cache files
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_SECRET: ${{ secrets.EBAY_SECRET }}
          EBAY_CAMPAIGN_ID: ${{ secrets.EBAY_CAMPAIGN_ID }}
        run: node scripts/refresh-cache.js
      - name: Commit and push cache files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache/
          git diff --staged --quiet || (git commit -m "chore: refresh eBay cache" && git push)
