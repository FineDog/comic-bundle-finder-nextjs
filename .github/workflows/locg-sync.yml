# Syncs LOCG wish lists and collections for all users who have a saved username.
# Runs nightly, or can be triggered on-demand from the UI via workflow_dispatch
# (the /api/locg-trigger route passes db_user_id to sync a single user immediately).
#
# Required GitHub secrets:
#   DATABASE_URL — Neon Postgres connection string

name: Sync LOCG Lists

on:
  schedule:
    - cron: "0 8 * * *"   # 8:00 UTC daily (4 AM Eastern)
  workflow_dispatch:
    inputs:
      db_user_id:
        description: "DB user ID to sync (leave blank to sync all users)"
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Sync LOCG data
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          SYNC_DB_USER_ID: ${{ inputs.db_user_id }}
        run: node scripts/sync-locg.mjs
