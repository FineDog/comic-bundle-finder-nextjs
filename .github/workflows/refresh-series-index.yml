# Keeps series metadata current using an incremental Metron sync.
#
# INCREMENTAL (daily, default after first run):
#   Reads series-manifest.json for the lastRun timestamp. Calls Metron with
#   modified_gt={lastRun} to fetch only changed series. Typically 0–20 calls/day.
#
# FULL (first run, or when series-manifest.json is absent from the repo):
#   Fetches all ~15,000+ series (~160 pages, ~10 minutes). This is a one-time
#   operation. After completion series-manifest.json is committed and all future
#   runs are incremental.
#   To force a full re-run: delete series-manifest.json from the repo and trigger manually.
#
# Commits:
#   public/data/series-index.json   — series metadata
#   public/data/series-manifest.json — lastRun timestamp (internal, enables incremental)
#
# Required GitHub secrets:
#   METRON_USERNAME — Metron account username
#   METRON_PASSWORD — Metron account password

name: Refresh Series Index

on:
  schedule:
    - cron: "0 7 * * *"    # 7:00 AM UTC daily (was weekly — incremental runs are cheap)
  workflow_dispatch:         # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Fetch series index from Metron
        env:
          METRON_USERNAME: ${{ secrets.METRON_USERNAME }}
          METRON_PASSWORD: ${{ secrets.METRON_PASSWORD }}
        run: node scripts/refresh-series-index.js
      - name: Commit and push series index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/series-index.json public/data/series-manifest.json
          git diff --staged --quiet || (git commit -m "chore: refresh series index" && git push)
