# Fetches all series from the Metron API and commits:
#   public/data/series-index.json — series metadata for client-side search
#                                   and static page generation
#
# Runs weekly (not nightly) since series metadata changes rarely and the job
# takes ~12 minutes to paginate through ~20,000 series at the safe Metron
# rate limit. Run manually anytime via workflow_dispatch.
#
# Required GitHub secrets:
#   METRON_USERNAME — Metron account username
#   METRON_PASSWORD — Metron account password

name: Refresh Series Index

on:
  schedule:
    - cron: "0 7 * * 0"   # 7:00 AM UTC every Sunday
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Fetch series index from Metron
        env:
          METRON_USERNAME: ${{ secrets.METRON_USERNAME }}
          METRON_PASSWORD: ${{ secrets.METRON_PASSWORD }}
        run: node scripts/refresh-series-index.js
      - name: Commit and push series index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/series-index.json
          git diff --staged --quiet || (git commit -m "chore: refresh series index" && git push)
