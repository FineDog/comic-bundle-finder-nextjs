# Fetches all story arcs from the Metron API and commits arc-index.json.
# The commit triggers a Vercel redeploy so the search index stays current.
#
# Required GitHub secrets:
#   METRON_USERNAME       — Metron account username
#   METRON_PASSWORD       — Metron account password
#   BLOB_READ_WRITE_TOKEN — Vercel Blob token (same value as in Vercel env vars)

name: Refresh Arc Index

on:
  schedule:
    - cron: "30 6 * * *"   # 6:30 AM UTC daily (2:30 AM Eastern)
  workflow_dispatch:         # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Fetch arc index from Metron
        env:
          METRON_USERNAME: ${{ secrets.METRON_USERNAME }}
          METRON_PASSWORD: ${{ secrets.METRON_PASSWORD }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node scripts/refresh-arc-index.js
      - name: Commit and push arc index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/arc-index.json
          git diff --staged --quiet || (git commit -m "chore: refresh arc index" && git push)
