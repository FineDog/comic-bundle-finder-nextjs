# Fetches all story arcs from the Metron API and commits:
#   public/data/arc-index.json  — arc metadata
#   public/data/arc-issues.json — arc issue lists (replaces Vercel Blob writes)
#
# Required GitHub secrets:
#   METRON_USERNAME — Metron account username
#   METRON_PASSWORD — Metron account password

name: Refresh Arc Index

on:
  schedule:
    - cron: "30 6 * * *"   # 6:30 AM UTC daily (2:30 AM Eastern)
  workflow_dispatch:         # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Test Metron reachability
        env:
          METRON_USERNAME: ${{ secrets.METRON_USERNAME }}
          METRON_PASSWORD: ${{ secrets.METRON_PASSWORD }}
        run: |
          echo "=== curl test ==="
          CURL_BODY=$(curl -s -u "${METRON_USERNAME}:${METRON_PASSWORD}" "https://metron.cloud/api/arc/?page_size=1")
          echo "curl first 120 chars: ${CURL_BODY:0:120}"

          echo "=== Node.js fetch test (same headers as script) ==="
          node --input-type=module <<'EOF'
          const auth = Buffer.from(`${process.env.METRON_USERNAME}:${process.env.METRON_PASSWORD}`).toString("base64");
          const res = await fetch("https://metron.cloud/api/arc/?page_size=1", {
            headers: { Authorization: `Basic ${auth}`, Accept: "application/json", "User-Agent": "ComicBundleFinder/2.0" }
          });
          const text = await res.text();
          console.log("Node status:", res.status);
          console.log("Node first 120 chars:", text.slice(0, 120));
          EOF

          echo "=== Node.js fetch test (no Accept / no User-Agent) ==="
          node --input-type=module <<'EOF'
          const auth = Buffer.from(`${process.env.METRON_USERNAME}:${process.env.METRON_PASSWORD}`).toString("base64");
          const res = await fetch("https://metron.cloud/api/arc/?page_size=1", {
            headers: { Authorization: `Basic ${auth}` }
          });
          const text = await res.text();
          console.log("Node (bare) status:", res.status);
          console.log("Node (bare) first 120 chars:", text.slice(0, 120));
          EOF
      - name: Fetch arc index from Metron
        env:
          METRON_USERNAME: ${{ secrets.METRON_USERNAME }}
          METRON_PASSWORD: ${{ secrets.METRON_PASSWORD }}
        run: node scripts/refresh-arc-index.js
      - name: Commit and push arc index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/arc-index.json public/data/arc-issues.json
          git diff --staged --quiet || (git commit -m "chore: refresh arc index" && git push)
