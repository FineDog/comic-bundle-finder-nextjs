# Keeps arc data current using an incremental Metron sync.
#
# INCREMENTAL (daily, default after first run):
#   Reads arc-manifest.json for the lastRun timestamp. Calls Metron with
#   modified_gt={lastRun} to fetch only changed arcs. Typically 0–10 calls/day.
#
# FULL (first run, or when arc-manifest.json is absent from the repo):
#   Fetches all arcs and builds the index from scratch (one-time, ~4–6 hours).
#   After completion arc-manifest.json is committed; future runs are incremental.
#   To force a full re-run: delete arc-manifest.json from the repo and trigger manually.
#
# Commits:
#   public/data/arc-index.json   — arc metadata
#   public/data/arc-issues.json  — arc issue lists
#   public/data/arc-manifest.json — lastRun timestamp (internal, enables incremental)
#
# Required GitHub secrets:
#   METRON_USERNAME — Metron account username
#   METRON_PASSWORD — Metron account password

name: Refresh Arc Index

on:
  # Schedule disabled until initial full backfill is complete.
  # Re-enable by uncommenting the schedule block below.
  # schedule:
  #   - cron: "30 6 * * *"   # 6:30 AM UTC daily (2:30 AM Eastern)
  workflow_dispatch:
    inputs:
      offset:
        description: "FULL RUN CHUNK: start index in arc list (leave blank for incremental or full)"
        required: false
        default: ""
      limit:
        description: "FULL RUN CHUNK: number of arcs to process (leave blank for all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Test Metron reachability
        env:
          METRON_USERNAME: ${{ secrets.METRON_USERNAME }}
          METRON_PASSWORD: ${{ secrets.METRON_PASSWORD }}
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -u "${METRON_USERNAME}:${METRON_PASSWORD}" "https://metron.cloud/api/arc/?page_size=1")
          echo "Metron HTTP status: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "Non-200 — credentials rejected or IP blocked."
            exit 1
          fi
          echo "Metron reachable. Proceeding."
      - name: Fetch arc index from Metron
        env:
          METRON_USERNAME: ${{ secrets.METRON_USERNAME }}
          METRON_PASSWORD: ${{ secrets.METRON_PASSWORD }}
          METRON_ARC_OFFSET: ${{ github.event.inputs.offset }}
          METRON_ARC_LIMIT:  ${{ github.event.inputs.limit }}
        run: node scripts/refresh-arc-index.js
      - name: Commit and push arc index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/arc-index.json public/data/arc-issues.json
          [ -f public/data/arc-manifest.json ] && git add public/data/arc-manifest.json || true
          git diff --staged --quiet || (git commit -m "chore: refresh arc index" && git push)
